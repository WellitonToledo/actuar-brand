  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-bottom:-.12em;\"><span data-reveal=\"\" data-reveal-delay=\"240\" style=\"display:block;transform:translateY(112%);transition:transform .95s cubic-bezier(.16,1,.3,1);\">a marca <span style=\"background:var(--headline-fill);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;\">evolui<\u002Fspan>.<\u002Fspan><\u002Fspan><\u002Fh1>\n      <p data-reveal=\"\" data-reveal-delay=\"460\" style=\"opacity:0;transform:translateY(24px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-size:clamp(18px,1.5vw,22px);line-height:1.55;color:var(--ink-soft);max-width:46ch;margin:30px 0 0;\">A história da Actuar — e o símbolo que abre o próximo ciclo de uma plataforma feita para crescer.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" data-idle-cue=\"\" data-reveal-delay=\"420\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s ease,transform 1s ease;position:absolute;bottom:clamp(30px,6vh,60px);left:clamp(24px,6vw,96px);display:flex;align-items:center;gap:12px;\">\n      <span style=\"font-family:'Space Grotesk';font-weight:500;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);\">Role para descobrir<\u002Fspan>\n      <span style=\"display:inline-block;animation:cue 1.8s ease-in-out infinite;color:var(--accent);font-size:18px;line-height:1;\">↓<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CURRENT LOGO + HISTORY ============ -->\n  <section style=\"position:relative;padding:clamp(90px,14vh,180px) clamp(24px,6vw,96px);overflow:hidden;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;display:flex;flex-wrap:wrap;gap:clamp(40px,6vw,96px);align-items:center;\">\n      <div style=\"flex:1 1 360px;min-width:300px;\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--eyebrow);\">Três identidades, uma evolução<\u002Fdiv>\n        <div style=\"margin-top:26px;display:flex;flex-direction:column;gap:14px;width:100%;max-width:440px;\">\n          <div data-reveal=\"\" data-reveal-delay=\"0\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s ease,transform .85s cubic-bezier(.16,1,.3,1);position:relative;border-radius:18px;background:#ffffff;border:1px solid var(--card-ring);padding:clamp(26px,4vw,40px) clamp(28px,4vw,46px);box-shadow:0 24px 60px -46px rgba(0,0,0,.55);\">\n            <img src=\"91e68c49-1341-4ee2-9f05-7727521e8551\" alt=\"Primeira logo da Actuar\" style=\"display:block;width:100%;height:auto;\">\n            <span style=\"position:absolute;top:12px;right:14px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:11px;letter-spacing:.04em;color:#9a948b;border:1px solid rgba(0,0,0,.12);padding:3px 9px;border-radius:999px;\">2007<\u002Fspan>\n          <\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"230\" style=\"opacity:0;transform:scale(.4);transition:opacity .5s ease,transform .6s cubic-bezier(.34,1.56,.64,1);display:flex;justify-content:center;color:var(--ink-soft);font-size:15px;line-height:1;\">↓<\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"380\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s ease,transform .85s cubic-bezier(.16,1,.3,1);position:relative;border-radius:18px;background:#ffffff;border:1px solid var(--card-ring);padding:clamp(26px,4vw,40px) clamp(28px,4vw,46px);box-shadow:0 24px 60px -46px rgba(0,0,0,.55);\">\n            <img src=\"0f0aa07b-efe3-4cb2-9408-639426b29907\" alt=\"Logo atual da Actuar\" style=\"display:block;width:100%;height:auto;\">\n            <span style=\"position:absolute;top:12px;right:14px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:11px;letter-spacing:.04em;color:#9a948b;border:1px solid rgba(0,0,0,.12);padding:3px 9px;border-radius:999px;\">2016<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 420px;min-width:300px;\">\n        <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(26px);transition:opacity .9s ease,transform .9s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,4.4vw,58px);line-height:1.02;letter-spacing:-.02em;margin:0;color:var(--ink);\">De onde a Actuar vem<\u002Fh2>\n        <p data-reveal=\"\" data-reveal-delay=\"140\" style=\"opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease;font-size:clamp(17px,1.4vw,21px);line-height:1.62;color:var(--ink-soft);margin:26px 0 0;max-width:52ch;\">Há dezenove anos a Actuar começava com uma marca angular e direta. Em 2016 ela amadureceu — formas mais arredondadas e bastante moderna para a época. Cada identidade carregou a mesma promessa: gestão mais simples, clara e confiável — e preparou o terreno para o próximo passo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TRANSITION ============ -->\n  <section style=\"position:relative;min-height:78vh;display:flex;align-items:center;justify-content:center;padding:clamp(90px,14vh,180px) clamp(24px,6vw,96px);background:var(--bg2);overflow:hidden;transition:background .6s ease;\">\n    <div data-speed=\"0.3\" data-base-transform=\"translate(-50%,-50%)\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Space Grotesk';font-weight:700;font-size:clamp(180px,34vw,520px);line-height:.8;letter-spacing:-.04em;color:var(--ghost);pointer-events:none;white-space:nowrap;\">10<\u002Fdiv>\n    <div style=\"position:relative;text-align:center;width:min(900px,100%);\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">10 anos depois<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(28px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(34px,6vw,86px);line-height:1.0;letter-spacing:-.025em;margin:24px 0 0;color:var(--ink);text-wrap:balance;\">Toda evolução começa com um <span style=\"background:var(--headline-fill);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;\">símbolo<\u002Fspan>.<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ NEW LOGO REVEAL ============ -->\n  <section style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(90px,14vh,180px) clamp(24px,6vw,96px);overflow:hidden;\">\n    <div data-speed=\"0.18\" data-base-transform=\"translateX(-50%)\" style=\"position:absolute;top:8%;left:50%;transform:translateX(-50%);width:64vw;height:64vw;max-width:900px;max-height:900px;border-radius:50%;background:radial-gradient(circle,var(--orb1),transparent 60%);opacity:var(--orb-op);filter:blur(50px);pointer-events:none;\"><\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;position:relative;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">THE NEW ACTUAR<\u002Fdiv>\n    <div data-reveal=\"\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(64px) scale(.9);transition:opacity 1.1s ease,transform 1.2s cubic-bezier(.34,1.56,.64,1);position:relative;margin:34px 0 0;width:min(720px,100%);border-radius:26px;overflow:hidden;border:1px solid var(--card-ring);box-shadow:0 40px 100px -40px rgba(1,34,249,.55);\">\n      <img src=\"8153002a-7898-4f17-94f7-5853713c686e\" alt=\"Nova logo da Actuar\" style=\"display:block;w or seguir a mesma linguagem visual: formas arredondadas, cheias, simples e amigáveis. O conjunto transmite modernidade sem perder confiança, proximidade sem parecer informal demais, e simplicidade criando uma identidade original. É uma marca que comunica movimento, organização e evolução contínua — exatamente a promessa de uma plataforma que transforma a gestão recorrente em crescimento previsível.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" data-reveal-delay=\"60\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);margin-top:clamp(56px,9vh,104px);\">Três cores, três forças<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:clamp(20px,2.4vw,32px);margin-top:clamp(28px,4vh,44px);\">\n        <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);background:var(--ghost);border:1px solid var(--line);border-radius:18px;padding:clamp(26px,2.6vw,36px);\">\n          <div style=\"width:52px;height:52px;border-radius:14px;background:#fb5423;box-shadow:0 6px 22px rgba(251,84,35,.35);\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin:20px 0 0;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(19px,1.5vw,23px);letter-spacing:-.01em;color:var(--ink);\">Laranja<\u002Fspan><span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;letter-spacing:.02em;color:var(--ink-soft);\">#FB5423<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin:6px 0 0;\">Energia &amp; ação<\u002Fdiv>\n          <p style=\"font-size:clamp(15px,1.15vw,17px);line-height:1.6;color:var(--ink-soft);margin:14px 0 0;\">Actuar nasce do verbo agir. O laranja é o impulso humano por trás da plataforma — calor, iniciativa e a vontade de fazer acontecer.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);background:var(--ghost);border:1px solid var(--line);border-radius:18px;padding:clamp(26px,2.6vw,36px);\">\n          <div style=\"width:52px;height:52px;border-radius:14px;background:#1b2feb;box-shadow:0 6px 22px rgba(27,47,235,.35);\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin:20px 0 0;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(19px,1.5vw,23px);letter-spacing:-.01em;color:var(--ink);\">Azul<\u002Fspan><span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;letter-spacing:.02em;color:var(--ink-soft);\">#1B2FEB<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin:6px 0 0;\">Confiança &amp; estrutura<\u002Fdiv>\n          <p style=\"font-size:clamp(15px,1.15vw,17px);line-height:1.6;color:var(--ink-soft);margin:14px 0 0;\">A base sólida sobre a qual tudo se apóia. O azul carrega tecnologia, segurança e a robustez de um ERP em que se pode confiar todos os dias.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"360\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);background:var(--ghost);border:1px solid var(--line);border-radius:18px;padding:clamp(26px,2.6vw,36px);\">\n          <div style=\"width:52px;height:52px;border-radius:14px;background:#1fefff;box-shadow:0 6px 22px rgba(31,239,255,.35);\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin:20px 0 0;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(19px,1.5vw,23px);letter-spacing:-.01em;color:var(--ink);\">Ciano<\u002Fspan><span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;letter-spacing:.02em;color:var(--ink-soft);\">#1FEFFF<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin:6px 0 0;\">Movimento &amp; recorrência<\u002Fdiv>\n          <p style=\"font-size:clamp(15px,1.15vw,17px);line-height:1.6;color:var(--ink-soft);margin:14px 0 0;\">A onda na base do símbolo. O ciano traduz fluidez, futuro e o ciclo contínuo da recorrência — o negócio sempre em movimento.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ NEXT STEPS ============ -->\n  <section data-screen-label=\"Próximos passos\" style=\"position:relative;padding:clamp(90px,14vh,190px) clamp(24px,6vw,96px);background:var(--bg);overflow:hidden;transition:background .6s ease;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">Próximos passos<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,5vw,72px);line-height:1.0;letter-spacing:-.025em;margin:18px 0 0;max-width:16ch;color:var(--ink);text-wrap:balance;\">A marca chega junto com o produto<\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"220\" style=\"opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease;font-size:clamp(17px,1.4vw,21px);line-height:1.6;color:var(--ink-soft);max-width:54ch;margin:26px 0 0;\">O rebranding é o primeiro movimento de um lançamento maior: uma nova versão do actuar.com apresentando a nova identidade ao lado do novo SaaS — codinome <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:1px 9px;font-size:.82em;letter-spacing:.02em;\">thenew<\u002Fspan>.<\u002Fp>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:clamp(20px,2.4vw,32px);margin-top:clamp(46px,7vh,80px);\">\n        <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);flex:1 1 280px;min-width:250px;background:var(--ghost);border:1px solid var(--line);border-radius:18px;padding:clamp(28px,3vw,40px);\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:.04em;color:var(--accent);\">01<\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(20px,1.7vw,25px);line-height:1.15;letter-spacing:-.01em;margin:18px 0 0;color:var(--ink);\">Novo actuar.com<\u002Fh3>\n          <p style=\"font-size:clamp(15px,1.15vw,17px);line-height:1.6;color:var(--ink-soft);margin:14px 0 0;\">Reconstruir o site institucional sob a nova identidade — tom, linguagem visual e narrativa alinhados à nova fase.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);flex:1 1 280px;min-width:250px;background:var(--ghost);border:1px solid var(--line);border-radius:18px;padding:clamp(28px,3vw,40px);\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:.04em;color:var(--accent);\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk';font-weigh ata-reveal=\"\" data-reveal-delay=\"220\" style=\"opacity:0;transform:translateY(22px);transition:opacity .9s ease,transform .9s ease;font-size:clamp(18px,1.6vw,24px);line-height:1.5;color:var(--footer-ink);max-width:40ch;margin:34px 0 0;\">Run Better. Grow Faster.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"width:min(1180px,100%);margin:clamp(60px,10vh,120px) auto 0;padding-top:26px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;font-family:'Space Grotesk';font-size:13px;letter-spacing:.02em;color:var(--footer-ink);\">\n      <img src=\"b59d22f3-c384-42a1-9ca4-6b6aff34a4b5\" alt=\"actuar.group\" style=\"display:block;width:min(132px,40vw);height:auto;\">\n      <span style=\"display:flex;align-items:center;gap:clamp(14px,2vw,24px);flex-wrap:wrap;\">\n        <span>Identidade visual — rebranding<\u002Fspan>\n        <a href=\"actuar-brand-system.html\" style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.01em;color:var(--ink);text-decoration:none;white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:9px 17px;transition:background .3s ease,border-color .3s ease;\" style-hover=\"background:var(--ghost);border-color:var(--accent);\">Brand system <span style=\"color:var(--accent);\">→<\u002Fspan><\u002Fa>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:2400},&quot;direction&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;eclipse&quot;,&quot;eletrico&quot;,&quot;atelie&quot;],&quot;default&quot;:&quot;eletrico&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Tema&quot;},&quot;parallaxStrength&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Movimento&quot;},&quot;showOrbs&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Movimento&quot;}}\">\nclass Component extends DCLogic {\n  themes = {\n    0: { // Eclipse\n      '--bg':'#0a0a0b','--bg2':'#101012','--ink':'#f5f4f1','--ink-soft':'#9a9a96',\n      '--line':'rgba(255,255,255,.13)','--eyebrow':'#ff8b59','--accent':'#ff8b59','--accent2':'#23eefd',\n      '--headline-fill':'linear-gradient(100deg,#ff8b59,#23eefd)','--orb1':'#ff8b59','--orb2':'#23eefd','--orb-op':'.16',\n      '--card-bg':'#0122f9','--card-ring':'rgba(255,255,255,.14)','--footer-bg':'#050506','--footer-ink':'#9a9a96',\n      '--ghost':'rgba(255,255,255,.035)','--switch-bg':'rgba(255,255,255,.06)','--mark-op':'.12'\n    },\n    1: { // Eletrico\n      '--bg':'#0122f9','--bg2':'#011bcf','--ink':'#f6fffd','--ink-soft':'rgba(246,255,253,.74)',\n      '--line':'rgba(255,255,255,.22)','--eyebrow':'#23eefd','--accent':'#ff8b59','--accent2':'#23eefd',\n      '--headline-fill':'linear-gradient(100deg,#ffd9c7,#23eefd)','--orb1':'#ff8b59','--orb2':'#23eefd','--orb-op':'.30',\n      '--card-bg':'#0122f9','--card-ring':'rgba(35,238,253,.45)','--footer-bg':'#011699','--footer-ink':'rgba(246,255,253,.78)',\n      '--ghost':'rgba(255,255,255,.06)','--switch-bg':'rgba(255,255,255,.12)','--mark-op':'.16'\n    },\n    2: { // Atelie\n      '--bg':'#fbf6f3','--bg2':'#f1e9dd','--ink':'#16140f','--ink-soft':'#6c665b',\n      '--line':'rgba(0,0,0,.13)','--eyebrow':'#d65f33','--accent':'#e0703f','--accent2':'#0fa9bc',\n      '--headline-fill':'linear-gradient(100deg,#e0703f,#0fa9bc)','--orb1':'#ff8b59','--orb2':'#23eefd','--orb-op':'.12',\n      '--card-bg':'#0122f9','--card-ring':'rgba(0,0,0,.10)','--footer-bg':'#16140f','--footer-ink':'#cfc9bd',\n      '--ghost':'rgba(0,0,0,.04)','--switch-bg':'rgba(0,0,0,.05)','--mark-op':'.13'\n    }\n  };\n\n  componentDidMount(){\n    const root = document.getElementById('actuar-root');\n    if(!root) return;\n    this.root = root;\n\n    this.btns = Array.from(root.querySelectorAll('[data-switch]'));\n    this.btns.forEach(b => b.addEventListener('click', () => this.setDir(parseInt(b.dataset.switch,10))));\n\n    const map = {eclipse:0, eletrico:1, electric:1, atelie:2, atelier:2};\n    const p = String(this.props.direction || '').toLowerCase().replace(/[^a-z]/g,'');\n    this.dir = (p in map) ? map[p] : 1;\n    this.applyTheme(this.dir);\n\n    this.reveals = Array.from(root.querySelectorAll('[data-reveal]'));\n    this.revealed = this.revealed || new Set();\n    this.layers = Array.from(root.querySelectorAll('[data-speed]'));\n\n    this.cue = root.querySelector('[data-idle-cue]');\n    this._armIdle = () => {\n      clearTimeout(this._idle);\n      this._idle = setTimeout(()=>{\n        if(this.cue){ this.cue.style.transitionDelay = '0ms'; this.cue.style.opacity = '1'; this.cue.style.transform = 'none'; }\n      }, 3300);\n    };\n\n    this.switcher = root.querySelector('[data-theme-switcher]');\n\n    this._tick = () => {\n      this._armIdle();\n      if(this._raf) return;\n      this._raf = requestAnimationFrame(()=>{ this._raf = null; this.parallax(); this.checkReveals(); this.updateSwitcher(); });\n    };\n    this._armIdle();\n    window.addEventListener('scroll', this._tick, {passive:true});\n    window.addEventListener('resize', this._tick, {passive:true});\n\n    this.parallax();\n    // Defer the first reveal pass two frames so the start state (translateY/opacity:0)\n    // paints before we flip to final — otherwise above-the-fold elements (hero) snap\n    // in with no transition instead of animating.\n    requestAnimationFrame(()=>requestAnimationFrame(()=>this.checkReveals()));\n    // settle passes for fonts / late layout\n    [120, 400, 900].forEach(t=>setTimeout(()=>{ this.parallax(); this.checkReveals(); }, t));\n\n    this._setupWordMorph(root);\n  }\n\n  // Cycles the highlighted word once, when its section scrolls into view,\n  // stopping on the final word.\n  _setupWordMorph(root){\n    const el = root.querySelector('[data-morph]');\n    if(!el) return;\n    const words = ['cima','crescimento','progresso','evolu\\u00e7\\u00e3o'];\n    const run = () => {\n      let i = 0;\n      el.style.transition = 'opacity .42s ease, transform .42s cubic-bezier(.16,1,.3,1)';\n      const step = () => {\n        i++;\n        if(i >= words.length) return;\n        // slide current word up & out\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(-0.42em)';\n        setTimeout(() => {\n          // swap text below the line, no transition for the jump\n          el.style.transition = 'none';\n          el.textContent = words[i];\n          el.style.transform = 'translateY(0.42em)';\n          void el.offsetHeight; // commit\n          // animate the new word up into place\n          el.style.transition = 'opacity .42s ease, transform .42s cubic-bezier(.16,1,.3,1)';\n          requestAnimationFrame(() => {\n            el.style.opacity = '1';\n            el.style.transform = 'translateY(0)';\n          });\n          if(i < words.length - 1) setTimeout(step, 1050);\n        }, 440);\n      };\n      setTimeout(step, 1900);\n    };\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if(e.isIntersecting){ io.disconnect(); run(); }\n      });\n    }, { threshold: 0.6 });\n    io.observe(el);\n    this._wordIO = io;\n  }\n\n  checkReveals(){\n    const vh = window.innerHeight;\n    const trigger = vh * 0.9;\n    this.reveals = this.reveals.filter(el=>{\n      const top = el.getBoundingClientRect().top;\n      if(top < trigger){\n        el.style.transitionDelay = ((parseFloat(el.dataset.revealDelay)||0)) + 'ms';\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n        this.revealed.add(el);\n        return false; // done, drop from list\n      }\n      return true;\n    });\n  }\n\n  componentDidUpdate(){\n    // React re-renders re-apply template inline styles (translateY/opacity:0);\n    // re-pin already-revealed elements instantly so the animation doesn't undo itself.\n    if(!this.revealed) return;\n    this.revealed.forEach(el=>{\n      el.style.transition = 'none';\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n      void el.offsetHeight;\n      el.style.transition = '';\n    });\n  }\n\n  updateSwitcher(){\n    if(!this.switcher) return;\n    const hidden = window.scrollY > 80;\n    this.switcher.style.opacity = hidden ? '0' : '1';\n    this.switcher.style.transform = hidden ? 'translateY(-14px)' : 'none';\n    this.switcher.style.pointerEvents = hidden ? 'none' : 'auto';\n  }\n\n  parallax(){\n    const vh = window.innerHeight;\n    const strength = (this.props.parallaxStrength != null ? this.props.parallaxStrength : 1);\n    this.layers.forEach(el=>{\n      const s = parseFloat(el.dataset.speed) || 0;\n      const r = el.getBoundingClientRect();\n      const center = r.top + r.height/2;\n      const off = (center - vh/2) / vh;\n      const base = el.dataset.baseTransform || '';\n      el.style.transform = base + ' translate3d(0,' + (off*s*150*strength).toFixed(1) + 'px,0)';\n    });\n  }\n\n  componentWillUnmount(){\n    clearTimeout(this._idle);\n    window.removeEventListener('scroll', this._tick);\n    window.removeEventListener('resize', this._tick);\n    if(this._wordIO) this._wordIO.disconnect();\n  }\n\n  setDir(d){ this.dir = d; this.applyTheme(d); }\n\n  applyTheme(d){\n    const t = this.themes[d];\n    if(!t || !this.root) return;\n    const showOrbs = this.props.showOrbs !== false;\n    for(const k in t){\n      this.root.style.setProperty(k, (k === '--orb-op' && !showOrbs) ? '0' : t[k]);\n    }\n    if(this.btns){\n      this.btns.forEach((b,i)=>{\n        const on = i === d;\n        b.style.background = on ? 'var(--ink)' : 'transparent';\n        b.style.color = on ? 'var(--bg)' : 'var(--ink-soft)';\n      });\n    }\n  }\n\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
