  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

k-soft);\">Elétrico<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ============ HERO ============ -->\n  <section style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:clamp(110px,16vh,200px) clamp(24px,6vw,96px) clamp(60px,8vh,120px);overflow:hidden;\">\n    <div data-speed=\"0.2\" style=\"position:absolute;top:-8%;right:-4%;width:42vw;height:42vw;max-width:640px;max-height:640px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FB5423,transparent 66%);opacity:var(--orb-op);filter:blur(40px);pointer-events:none;\"><\u002Fdiv>\n    <div data-speed=\"-0.15\" style=\"position:absolute;bottom:-12%;left:-6%;width:40vw;height:40vw;max-width:560px;max-height:560px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#1FEFFF,transparent 64%);opacity:var(--orb-op);filter:blur(40px);pointer-events:none;\"><\u002Fdiv>\n\n    <div style=\"position:relative;width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">Identidade visual · três cores<\u002Fdiv>\n      <h1 style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(42px,8vw,116px);line-height:.97;letter-spacing:-.03em;margin:22px 0 0;max-width:15ch;color:var(--ink);\">\n        <span style=\"display:block;overflow:hidden;padding-bottom:.1em;margin-bottom:-.1em;\"><span data-reveal=\"\" data-reveal-delay=\"0\" style=\"display:block;transform:translateY(112%);transition:transform .95s cubic-bezier(.16,1,.3,1);\">A cor não é<\u002Fspan><\u002Fspan>\n        <span style=\"display:block;overflow:hidden;padding-bottom:.1em;margin-bottom:-.1em;\"><span data-reveal=\"\" data-reveal-delay=\"120\" style=\"display:block;transform:translateY(112%);transition:transform .95s cubic-bezier(.16,1,.3,1);\">decoração. É<\u002Fspan><\u002Fspan>\n        <span style=\"display:block;overflow:hidden;padding-bottom:.1em;margin-bottom:-.1em;\"><span data-reveal=\"\" data-reveal-delay=\"240\" style=\"display:block;transform:translateY(112%);transition:transform .95s cubic-bezier(.16,1,.3,1);\"><span style=\"background:var(--hl);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;\">linguagem<\u002Fspan>.<\u002Fspan><\u002Fspan>\n      <\u002Fh1>\n      <p data-reveal=\"\" data-reveal-delay=\"460\" style=\"opacity:0;transform:translateY(24px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-size:clamp(18px,1.5vw,22px);line-height:1.55;color:var(--ink-soft);max-width:50ch;margin:30px 0 0;\">Três cores, cada uma com um significado fixo, que se repete do logo ao produto, da ilustração ao motion. Quando o uso é consistente, a pessoa aprende a <em style=\"font-style:italic;color:var(--ink);\">ler<\u002Fem> a Actuar pela cor — e isso é o que faz uma marca durar.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- mother rule -->\n    <div data-reveal=\"\" data-reveal-delay=\"620\" style=\"opacity:0;transform:translateY(24px);transition:opacity 1s ease,transform 1s ease;position:relative;width:min(1180px,100%);margin:clamp(48px,7vh,84px) auto 0;display:flex;align-items:center;gap:clamp(16px,3vw,40px);flex-wrap:wrap;\">\n      <div style=\"width:3px;align-self:stretch;min-height:60px;border-radius:3px;background:var(--hl);\"><\u002Fdiv>\n      <div style=\"flex:1 1 360px;\">\n        <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);\">A regra-mãe<\u002Fdiv>\n        <p style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(24px,3.2vw,40px);line-height:1.1;letter-spacing:-.02em;margin:12px 0 0;color:var(--ink);\">A marca grita, o produto sussurra.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ AS TRÊS CORES ============ -->\n  <section data-screen-label=\"As três cores\" style=\"position:relative;padding:clamp(80px,12vh,150px) clamp(24px,6vw,96px);background:var(--bg2);overflow:hidden;transition:background .6s ease;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">As três cores<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,5vw,64px);line-height:1.02;letter-spacing:-.025em;margin:16px 0 0;max-width:18ch;color:var(--ink);text-wrap:balance;\">Cada cor carrega uma força<\u002Fh2>\n\n      <div style=\"margin-top:clamp(44px,7vh,84px);display:flex;flex-direction:column;gap:clamp(20px,2.6vw,30px);\">\n\n        <!-- ORANGE -->\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(30px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);display:flex;flex-wrap:wrap;border-radius:22px;overflow:hidden;border:1px solid var(--line);background:var(--ghost);\">\n          <div style=\"flex:1 1 320px;min-height:300px;position:relative;background:#FB5423;display:flex;flex-direction:column;justify-content:space-between;padding:clamp(28px,3vw,42px);\">\n            <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.55);\">01 · o humano<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,3.6vw,50px);letter-spacing:-.01em;color:#1a0a04;\">#FB5423<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 360px;min-width:300px;padding:clamp(28px,3.2vw,46px);display:flex;flex-direction:column;justify-content:center;\">\n            <div style=\"display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,2.6vw,38px);letter-spacing:-.01em;color:var(--ink);\">Laranja<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#FB5423;\">Energia &amp; ação<\u002Fspan><\u002Fdiv>\n            <p style=\"font-size:clamp(15px,1.2vw,18px);line-height:1.62;color:var(--ink-soft);margin:16px 0 0;max-width:46ch;\">A Actuar nasce do verbo agir. O laranja é o impulso humano por trás da plataforma — calor, iniciativa e a vontade de fazer acontecer. É a cor de tudo que toca a pessoa: onboarding, perfil, suporte, os momentos em que alguém age.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px 28px;margin:22px 0 0;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px;color:var(--ink-soft);\">\n              <span style=\"color:var(--ink-mute)\">RGB<\u002Fspan><span>251, 84, 35<\u002Fspan>\n              <span style=\"flex-basis:100%;height:0;\"><\u002Fspan>\n              <span style=\"color:var(--ink-mute)\">P3<\u002Fspan><span>0.911&nbsp;0.378&nbsp;0.216<\u002Fspan>\n              <span style=\"flex-basis:100%;height:0;\"><\u002Fspan>\n              <span style=\"color:var(--ink-mute)\">Pantone<\u002Fspan><span>1655 C <span style=\"opacity:.6\">(aprox.)<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- BLUE -->\n        <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(30px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);display:flex;flex-wrap:wrap;border-radius:22px;overflow:hidden;border:1px solid var(--line);background:var(--ghost);\">\n          <div style=\"flex:1 1 320px;min-height:300px;position:relative;background:#1B2FEB;display:flex;flex-direction:column;justify-content:space-between;padding:clamp(28px,3vw,42px);box-shadow:inset 0 0 120px rgba(31,239,255,.18);\">\n            <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7);\">02 · o core<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,3.6vw,50px);letter-spacing:-.01em;color:#fff;\">#1B2FEB<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 360px;min-width:300px;padding:clamp(28px,3.2vw,46px);display:flex;flex-direction:column;justify-content:center;\">\n            <div style=\"display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,2.6vw,38px);letter-spacing:-.01em;color:var(--ink);\">Azul<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue-label);\">Confiança &amp; estrutura<\u002Fspan><\u002Fdiv>\n            <p style=\"font-size:clamp(15px,1.2vw,18px);line-height:1.62;color:var(--ink-soft);margin:16px 0 0;max-width:46ch;\">A base sólida sobre a qual tudo se apóia. O azul carrega tecnologia, segurança e a robustez de um ERP em que se confia todo dia. É o core: plataforma, dados, faturamento, catraca, relatório — onde mora a confiança.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px 28px;margin:22px 0 0;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px;color:var(--ink-soft);\">\n              <span style=\"color:var(--ink-mute)\">RGB<\u002Fspan><span>27, 47, 235<\u002Fspan>\n              <span style=\"flex-basis:100%;height:0;\"><\u002Fspan>\n              <span style=\"color:var(--ink-mute)\">P3<\u002Fspan><span>0.124&nbsp;0.182&nbsp;0.885<\u002Fspan>\n              <span style=\"flex-basis:100%;height:0;\"><\u002Fspan>\n              <span style=\"color:var(--ink-mute)\">Pantone<\u002Fspan><span>2736 C / Blue 072 C<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- CYAN -->\n        <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(30px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);display:flex;flex-wrap:wrap;border-radius:22px;overflow:hidden;border:1px solid var(--line);background:var(--ghost);\">\n          <div style=\"flex:1 1 320px;min-height:300px;position:relative;background:#1FEFFF;display:flex;flex-direction:column;justify-content:space-between;padding:clamp(28px,3vw,42px);\">\n            <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.5);\">03 · o fluxo<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,3.6vw,50px);letter-spacing:-.01em;color:#04282b;\">#1FEFFF<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 360px;min-width:300px;padding:clamp(28px,3.2vw,46px);display:flex;flex-direction:column;justify-content:center;\">\n            <div style=\"display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,2.6vw,38px);letter-spacing:-.01em;color:var(--ink);\">Ciano<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan-label);\">Movimento &amp; recorrência<\u002Fspan><\u002Fdiv>\n            <p style=\"font-size:clamp(15px,1.2vw,18px);line-height:1.62;color:var(--ink-soft);margin:16px 0 0;max-width:46ch;\">A onda na base do símbolo. O ciano traduz fluidez, futuro e o ciclo contínuo da recorrência — o negócio sempre em movimento. É a tradução visual da própria tese de um SaaS de assinatura: nada pontual, tudo fluxo.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px 28px;margin:22px 0 0;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px;color:var(--ink-soft);\">\n              <span style=\"color:var(--ink-mute)\">RGB<\u002Fspan><span>31, 239, 255<\u002Fspan>\n              <span style=\"flex-basis:100%;height:0;\"><\u002Fspan>\n              <span style=\"color:var(--ink-mute)\">P3<\u002Fspan><span>0.442&nbsp;0.924&nbsp;0.988<\u002Fspan>\n              <span style=\"flex-basis:100%;height:0;\"><\u002Fspan>\n              <span style=\"color:var(--ink-mute)\">Pantone<\u002Fspan><span>3115 C / 311 C<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MAPA COR → SIGNIFICADO ============ -->\n  <section data-screen-label=\"Mapa cor para significado\" style=\"position:relative;padding:clamp(80px,12vh,160px) clamp(24px,6vw,96px);overflow:hidden;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">Mapa cor → significado<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.4vw,58px);line-height:1.04;letter-spacing:-.025em;margin:16px 0 0;max-width:20ch;color:var(--ink);text-wrap:balance;\">A cor codifica intenção<\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(22px);transition:opacity .9s ease,transform .9s ease;font-size:clamp(16px,1.3vw,20px);line-height:1.6;color:var(--ink-soft);max-width:50ch;margin:22px 0 0;\">Ao aplicar, pergunte “o que isso <em style=\"font-style:italic;color:var(--ink);\">é<\u002Fem>?” antes de “que cor combina?”.<\u002Fp>\n\n      <div style=\"margin-top:clamp(40px,6vh,68px);border-top:1px solid var(--line);\">\n        <!-- row -->\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .8s ease,transform .8s ease;display:grid;grid-template-columns:minmax(140px,1fr) minmax(140px,1.1fr) minmax(220px,2fr);gap:clamp(16px,3vw,48px);align-items:start;padding:clamp(24px,3.4vh,36px) 0;border-bottom:1px solid var(--line);\">\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#FB5423;flex:none;box-shadow:0 4px 16px rgba(251,84,35,.4);\"><\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(17px,1.5vw,22px);color:var(--ink);\">Laranja<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(15px,1.25vw,18px);color:var(--ink);\">Energia, ação, o humano<\u002Fdiv>\n          <div style=\"font-size:clamp(14px,1.1vw,16.5px);line-height:1.55;color:var(--ink-soft);\">Onboarding, perfil, suporte, CTAs de iniciativa<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"100\" style=\"opacity:0;transform:translateY(22px);transition:opacity .8s ease,transform .8s ease;display:grid;grid-template-columns:minmax(140px,1fr) minmax(140px,1.1fr) minmax(220px,2fr);gap:clamp(16px,3vw,48px);align-items:start;padding:clamp(24px,3.4vh,36px) 0;border-bottom:1px solid var(--line);\">\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#1B2FEB;flex:none;box-shadow:0 4px 16px rgba(27,47,235,.5);\"><\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(17px,1.5vw,22px);color:var(--ink);\">Azul<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(15px,1.25vw,18px);color:var(--ink);\">Confiança, estrutura, o core<\u002Fdiv>\n          <div style=\"font-size:clamp(14px,1.1vw,16.5px);line-height:1.55;color:var(--ink-soft);\">Plataforma, faturamento, catraca, relatórios, base da identidade<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(22px);transition:opacity .8s ease,transform .8s ease;display:grid;grid-template-columns:minmax(140px,1fr) minmax(140px,1.1fr) minmax(220px,2fr);gap:clamp(16px,3vw,48px);align-items:start;padding:clamp(24px,3.4vh,36px) 0;border-bottom:1px solid var(--line);\">\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:26px;height:26px;border-radius:8px;background:#1FEFFF;flex:none;box-shadow:0 4px 16px rgba(31,239,255,.4);\"><\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(17px,1.5vw,22px);color:var(--ink);\">Ciano<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(15px,1.25vw,18px);color:var(--ink);\">Movimento, recorrência, futuro<\u002Fdiv>\n          <div style=\"font-size:clamp(14px,1.1vw,16.5px);line-height:1.55;color:var(--ink-soft);\">A onda do símbolo, ciclos de cobrança, assinatura, fluxo<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ REGRAS DE USO — marca vs produto ============ -->\n  <section data-screen-label=\"Regras de uso\" style=\"position:relative;padding:clamp(80px,12vh,160px) clamp(24px,6vw,96px);background:var(--bg2);overflow:hidden;transition:background .6s ease;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">Regras de uso<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.4vw,58px);line-height:1.04;letter-spacing:-.025em;margin:16px 0 0;max-width:18ch;color:var(--ink);text-wrap:balance;\">A marca grita.<br>O produto sussurra.<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(20px,2.6vw,30px);margin-top:clamp(40px,6vh,72px);\">\n        <!-- MARCA -->\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);border-radius:20px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <div style=\"height:140px;background:linear-gradient(115deg,#FB5423 0%,#1B2FEB 52%,#1FEFFF 100%);position:relative;display:flex;align-items:flex-end;padding:18px 22px;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;letter-spacing:.04em;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.3);\">Força total<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:clamp(24px,2.6vw,34px);background:var(--ghost);flex:1;\">\n            <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(19px,1.6vw,24px);letter-spacing:-.01em;margin:0;color:var(--ink);\">Marca<\u002Fh3>\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 0;\">Logo · site · login · marketing<\u002Fdiv>\n            <p style=\"font-size:clamp(15px,1.15vw,17px);line-height:1.6;color:var(--ink-soft);margin:16px 0 0;\">As três cores aparecem com força total. O símbolo vive no azul; a onda ciano acende; o laranja entra como energia. Ilustração e motion podem misturar as três como linguagem própria — as “energias” que se combinam.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- PRODUTO -->\n        <div data-reveal=\"\" data-reveal-delay=\"140\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);border-radius:20px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <div style=\"height:140px;background:var(--erp-surface);position:relative;display:flex;align-items:flex-end;padding:18px 22px;\">\n            <!-- neutral ERP surface w/ tiny brand accents -->\n            <div style=\"position:absolute;top:18px;left:22px;right:22px;display:flex;gap:8px;align-items:center;\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:#FB5423;\"><\u002Fspan>\n              <span style=\"height:7px;flex:1;border-radius:4px;background:var(--erp-bar);\"><\u002Fspan>\n              <span style=\"height:7px;width:34px;border-radius:4px;background:#1B2FEB;\"><\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--erp-ink);\">Acento pontual · ~10%<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:clamp(24px,2.6vw,34px);background:var(--ghost);flex:1;\">\n            <h3 style=\"font-family:'Space Grotesk';font-weight:600;font-size:clamp(19px,1.6vw,24px);letter-spacing:-.01em;margin:0;color:var(--ink);\">Produto / ERP<\u002Fh3>\n            <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 0;\">Telas de trabalho<\u002Fdiv>\n            <p style=\"font-size:clamp(15px,1.15vw,17px);line-height:1.6;color:var(--ink-soft);margin:16px 0 0;\">As cores de marca <strong style=\"color:var(--ink);font-weight:600;\">não<\u002Fstrong> forram superfícies. O app trabalha em neutros; marca entra só em ação, link, estado ativo e acento de status. Regra prática: se uma cor cobre mais de <strong style=\"color:var(--ink);font-weight:600;\">~10%<\u002Fstrong> de uma tela de trabalho, recuou demais pro lado do marketing.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WORDMARK ============ -->\n  <section data-screen-label=\"Wordmark\" style=\"position:relative;padding:clamp(80px,12vh,160px) clamp(24px,6vw,96px);overflow:hidden;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">Wordmark<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.4vw,58px);line-height:1.04;letter-spacing:-.025em;margin:16px 0 0;max-width:20ch;color:var(--ink);text-wrap:balance;\">O símbolo leva a cor; o nome, a base<\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(22px);transition:opacity .9s ease,transform .9s ease;font-size:clamp(16px,1.3vw,20px);line-height:1.6;color:var(--ink-soft);max-width:60ch;margin:22px 0 0;\">O símbolo carrega a cor — é o ativo distintivo da marca; concentrar a cor nele o faz brilhar sozinho. O wordmark fica num neutro escuro não por ser menos importante, mas porque o nome é a base: <em style=\"font-style:italic;color:var(--ink);\">estrutura não grita, sustenta<\u002Fem>. O neutro não é preto puro, que endurece e empobrece a marca: é um quase-preto azulado #0A1130, ainda dentro da família estrutura/azul. Assim o nome se mantém sólido e legível e continua significando base e confiança, sem disputar atenção com o símbolo. Neutro com sotaque, não genérico.<\u002Fp>\n\n      <!-- three versions -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:clamp(18px,2.2vw,26px);margin-top:clamp(40px,6vh,68px);\">\n\n        <!-- Primária -->\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <div style=\"background:#fff;min-height:128px;flex:1;display:flex;align-items:center;justify-content:center;padding:0 30px;\">\n            <span style=\"display:block;width:148px;height:38px;background:#0A1130;-webkit-mask:var(--wm) no-repeat center/contain;mask:var(--wm) no-repeat center/contain;\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px;background:var(--ghost);\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:10px;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);\">Primária<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#22c55e;border:1px solid rgba(34,197,94,.4);border-radius:999px;padding:4px 10px;\">AAA 18.5:1<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:12px;color:var(--ink-soft);margin:7px 0 0;\">Quase-preto azulado #0A1130<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.55;color:var(--ink-soft);margin:11px 0 0;\">Sobre fundo claro / branco — uso padrão.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Reversa -->\n        <div data-reveal=\"\" data-reveal-delay=\"100\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <div style=\"background:#1B2FEB;min-height:128px;flex:1;display:flex;align-items:center;justify-content:center;padding:0 30px;box-shadow:inset 0 0 120px rgba(31,239,255,.16);\">\n            <span style=\"display:block;width:148px;height:38px;background:#fff;-webkit-mask:var(--wm) no-repeat center/contain;mask:var(--wm) no-repeat center/contain;\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px;background:var(--ghost);\">\n            <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);\">Reversa<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:12px;color:var(--ink-soft);margin:7px 0 0;\">Branco #FFFFFF<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.55;color:var(--ink-soft);margin:11px 0 0;\">Sobre o azul, sobre foto ou fundo escuro.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Vibrante (opcional) -->\n        <div data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <div style=\"background:#fff;min-height:128px;flex:1;display:flex;align-items:center;justify-content:center;padding:0 30px;\">\n            <span style=\"display:block;width:148px;height:38px;background:#1B2FEB;-webkit-mask:var(--wm) no-repeat center/contain;mask:var(--wm) no-repeat center/contain;\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px;background:var(--ghost);\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:10px;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);\">Vibrante <span style=\"font-weight:500;color:var(--ink-soft);\">(opcional)<\u002Fspan><\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#22c55e;border:1px solid rgba(34,197,94,.4);border-radius:999px;padding:4px 10px;\">AAA 7.92:1<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:12px;color:var(--ink-soft);margin:7px 0 0;\">Azul cheio #1B2FEB<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.55;color:var(--ink-soft);margin:11px 0 0;\">Peças de marketing onde se quer o logo mais colorido.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- never -->\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease;display:flex;align-items:flex-start;gap:clamp(16px,3vw,36px);flex-wrap:wrap;margin:clamp(36px,5vh,56px) 0 0;padding:clamp(24px,3vw,34px);border-radius:18px;border:1px solid var(--line);background:var(--ghost);\">\n        <div style=\"display:flex;gap:12px;flex:none;\">\n          <span style=\"position:relative;display:flex;align-items:center;justify-content:center;width:clamp(60px,8vw,82px);height:clamp(60px,8vw,82px);border-radius:14px;background:#fff;overflow:hidden;\"><span style=\"display:block;width:64px;height:17px;background:#FB5423;-webkit-mask:var(--wm) no-repeat center/contain;mask:var(--wm) no-repeat center/contain;\"><\u002Fspan><span style=\"position:absolute;inset:0;border-radius:14px;border:2px solid #ef4444;\"><\u002Fspan><span style=\"position:absolute;width:118%;height:2px;background:#ef4444;transform:rotate(-38deg);\"><\u002Fspan><\u002Fspan>\n          <span style=\"position:relative;display:flex;align-items:center;justify-content:center;width:clamp(60px,8vw,82px);height:clamp(60px,8vw,82px);border-radius:14px;background:#fff;overflow:hidden;\"><span style=\"display:block;width:64px;height:17px;background:#1FEFFF;-webkit-mask:var(--wm) no-repeat center/contain;mask:var(--wm) no-repeat center/contain;\"><\u002Fspan><span style=\"position:absolute;inset:0;border-radius:14px;border:2px solid #ef4444;\"><\u002Fspan><span style=\"position:absolute;width:118%;height:2px;background:#ef4444;transform:rotate(-38deg);\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 320px;\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(17px,1.6vw,22px);letter-spacing:-.01em;color:var(--ink);\">Nunca em laranja ou ciano<\u002Fdiv>\n          <p style=\"font-size:clamp(14px,1.1vw,16.5px);line-height:1.6;color:var(--ink-soft);margin:12px 0 0;max-width:60ch;\">Não é questão de gosto: laranja diria “ação / impulso” e ciano diria “movimento / recorrência” — e ainda some no branco (1.41:1). O símbolo é a energia; o wordmark é a base — e a base recua para a cor viver no “A”.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ APLICAÇÕES ============ -->\n  <section data-screen-label=\"Aplicações\" style=\"position:relative;padding:clamp(80px,12vh,160px) clamp(24px,6vw,96px);background:var(--bg2);overflow:hidden;transition:background .6s ease;\">\n    <div style=\"width:min(1180px,100%);margin:0 auto;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;font-family:'Space Grotesk';font-weight:600;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--eyebrow);\">Aplicações<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4.4vw,58px);line-height:1.04;letter-spacing:-.025em;margin:16px 0 0;max-width:20ch;color:var(--ink);text-wrap:balance;\">A regra, em quatro superfícies<\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"200\" style=\"opacity:0;transform:translateY(22px);transition:opacity .9s ease,transform .9s ease;font-size:clamp(16px,1.3vw,20px);line-height:1.6;color:var(--ink-soft);max-width:56ch;margin:22px 0 0;\">A mesma decisão — cor no símbolo, nome no neutro — resolvida para cada fundo. Em cor quando dá; em uma tinta só quando o meio exige.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(18px,2.2vw,28px);margin-top:clamp(40px,6vh,68px);\">\n\n        <!-- Sobre fundo claro -->\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-bezier(.16,1,.3,1);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column;\">\n          <div style=\"background:#ffffff;min-height:clamp(240px,28vw,340px);flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(44px,6vw,80px);\">\n            <img src=\"6e59e5d4-23a5-49c9-a3e6-6985cae97c14\" alt=\"Logo Actuar sobre fundo claro\" style=\"display:block;width:min(78%,360px);height:auto;\">\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px;background:var(--ghost);\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:10px;\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);\">Sobre fundo claro<\u002Fspan><span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:11px;color:var(--ink-soft);\">PADRÃO<\u002Fspan><\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.55;color:var(--ink-soft);margin:9px 0 0;\">Símbolo em cor cheia, nome em #0A1130. Site, apresentação, papelaria.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Sobre o azul -->\n        <div data-reveal=\"\" data-reveal-delay=\"100\" style=\"opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s cubic-be
